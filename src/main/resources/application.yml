server:
  port: 8085

spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:postgresql://transfer-db:5432/bankx-transfer
    username: transfer_user
    password: transfer_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
            lob:
              non_contextual_creation: true
        show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  kafka:
    bootstrap-servers: kafka:9092
    # Consumer Configuration
    consumer:
      group-id: transfer-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false  # Ручное подтверждение для надежности
      properties:
        spring.json.trusted.packages: "com.bankx.transfer.*"
        # Настройки надежности
        isolation.level: read_committed
        max.poll.records: 10  # Обрабатывать небольшими батчами для идемпотентности
    # Producer Configuration
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      # Настройки надежности (требования 5.1)
      acks: all
      retries: 3
      properties:
        enable.idempotence: true  # Идемпотентность
        max.in.flight.requests.per.connection: 1  # Сохранение порядка
        compression.type: snappy
        linger.ms: 10
        batch.size: 16384
    # Listener Configuration
    listener:
      type: single
      ack-mode: manual

# Кастомные настройки Kafka топиков
kafka:
  topics:
    transfer:
      command: "transfer.command"
      status: "transfer.status"
    account:
      debit:
        request: "account.debit.request"
        response: "account.debit.response"
      credit:
        request: "account.credit.request"
        response: "account.credit.response"
      compensate:
        debit: "account.compensate.debit"
    dlt: "transfer-service-dlt"  # Dead Letter Topic

# Resilience4j для retry и circuit breaker (требования 5.1)
resilience4j:
  retry:
    instances:
      kafka-producer:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
  circuitbreaker:
    instances:
      kafka-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:

# Observability (требования 5.2)
logging:
  level:
    com.bankx.transfer: DEBUG
    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN
    org.hibernate.SQL: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

# Micrometer метрики для Kafka
micrometer:
  metrics:
    export:
      prometheus:
        enabled: true
  distribution:
    percentiles-histogram:
      http.server.requests: true